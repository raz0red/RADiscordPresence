version: "3"

# RADPresence build/dev tasks.
# Only requirement: https://taskfile.dev — everything else runs inside Docker.
#
# Common workflows:
#   task build         Build all platforms (windows, linux, macos)
#   task build:windows Build Windows amd64 only
#   task build:linux   Build Linux amd64 only
#   task build:mac     Build macOS amd64 + arm64 only
#   task fmt           Auto-format all Go source files
#   task validate      Format + vet + lint (run before pushing)

vars:
  IMAGE: radpresence-builder
  DOCKER_RUN: docker run --rm -v "{{.ROOT_DIR}}:/src:z" -w /src {{.IMAGE}}
  LINT_RUN: docker run --rm -v "{{.ROOT_DIR}}:/src" -w /src golangci/golangci-lint:latest

tasks:
  default:
    silent: true
    cmd: task --list

  # ── Docker image ──────────────────────────────────────────────────────────

  build:image:
    internal: true
    cmd: docker build -t {{.IMAGE}} build/

  # ── Builds ────────────────────────────────────────────────────────────────

  build:
    desc: Build all platforms (windows amd64, linux amd64, macos amd64/arm64)
    deps: [build:image]
    cmd: "{{.DOCKER_RUN}} sh build/build.sh"

  build:windows:
    desc: Build Windows amd64 binary only
    deps: [build:image]
    cmd: "{{.DOCKER_RUN}} sh build/build.sh windows-only"

  build:linux:
    desc: Build Linux amd64 binary only
    deps: [build:image]
    cmd: "{{.DOCKER_RUN}} sh build/build.sh linux-only"

  build:mac:
    desc: Build macOS amd64 + arm64 binaries only
    deps: [build:image]
    cmd: "{{.DOCKER_RUN}} sh build/build.sh mac-only"

  # ── Code quality ──────────────────────────────────────────────────────────

  fmt:
    desc: Auto-format all Go source files in-place
    deps: [build:image]
    cmd: "{{.DOCKER_RUN}} gofmt -w cmd/ internal/"

  fix:
    desc: Auto-format and apply golangci-lint auto-fixes
    deps: [build:image]
    cmds:
      - task: fmt
      - "{{.LINT_RUN}} golangci-lint run --fix"

  vet:
    desc: Run go vet across all packages
    deps: [build:image]
    cmd: "{{.DOCKER_RUN}} go vet ./..."

  lint:
    desc: Run golangci-lint
    cmd: "{{.LINT_RUN}} golangci-lint run"

  validate:
    desc: "Format, vet, and lint — run before pushing"
    cmds:
      - task: fmt
      - task: vet
      - task: lint

  # ── Utilities ─────────────────────────────────────────────────────────────

  clean:
    desc: Remove build artifacts (dist/)
    cmd: rm -rf dist/
